description: >-
  The US Army is the largest branch of the United States military and is responsible
  for conducting ground combat operations. Its mission is to defend the nation against
  its enemies by land, sea, and air. The Army also provides support for disaster relief
  efforts, peacekeeping missions, and humanitarian assistance around the world. Additionally,
  the Army plays a crucial role in training and equipping allied forces and maintaining
  peace and stability in regions of conflict.
