naftiko: 1.0.0-alpha2
info:
  label: US Army Public API — Events
  description: 'US Army Public API — Events. 1 operations. Lead operation: Get Events. Self-contained Naftiko capability covering
    one Us Army business surface.'
  tags:
  - Us Army
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_ARMY_API_KEY: US_ARMY_API_KEY
capability:
  consumes:
  - type: http
    namespace: public-events
    baseUri: https://api.army.mil/api/v1
    description: US Army Public API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: getevents
        method: GET
        description: Get Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of events to return
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: from
          in: query
          type: string
          description: Start date filter
        - name: to
          in: query
          type: string
          description: End date filter
  exposes:
  - type: rest
    namespace: public-events-rest
    port: 8080
    description: REST adapter for US Army Public API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: getevents
        description: Get Events
        call: public-events.getevents
        with:
          limit: rest.limit
          offset: rest.offset
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: public-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for US Army Public API — Events. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-events
      description: Get Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-events.getevents
      with:
        limit: tools.limit
        offset: tools.offset
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
